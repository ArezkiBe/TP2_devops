name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Run Car Service Tests
        run: |
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      - name: Run Customer Service Tests
        run: ./gradlew :customer-service:test :customer-service:jacocoTestReport

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=ArezkiBe_TP2_devops
            -Dsonar.organization=arezkibe
            -Dsonar.sources=src/main/java,customer-service/src/main/java
            -Dsonar.tests=src/test/java,customer-service/src/test/java
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml,customer-service/build/reports/jacoco/test/jacocoTestReport.xml
            -Dsonar.java.binaries=build/classes,customer-service/build/classes

      - name: Upload Car Service Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-car-service
          path: build/reports/jacoco/test/html/

      - name: Upload Customer Service Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-customer-service
          path: customer-service/build/reports/jacoco/test/html/

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            build/test-results/**/*.xml
            customer-service/build/test-results/**/*.xml

      - name: Build Docker images
        run: |
          docker build -t car-service:latest -f Dockerfile .
          docker build -t customer-service:latest -f customer-service/Dockerfile .
